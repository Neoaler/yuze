name: CMake on multiple platforms

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  # --- 任务 1: 编译主流操作系统 (Ubuntu, Windows, macOS) ---
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: gcc
          - os: macos-latest
            c_compiler: cl

    steps:
    - uses: actions/checkout@v4

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Configure CMake
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Rename binary for clarity
      shell: bash
      run: |
        OUTPUT_FILE="yuze-${{ runner.os }}-${{ runner.arch }}${{ runner.os == 'Windows' && '.exe' || '' }}"
        BUILD_DIR="${{ steps.strings.outputs.build-output-dir }}"
        BUILD_DIR=$(echo "$BUILD_DIR" | sed 's#\\#/#g')

        if [ "${{ runner.os }}" == "Windows" ]; then
          SOURCE_FILE="$BUILD_DIR/Release/yuze.exe"
        else
          SOURCE_FILE="$BUILD_DIR/yuze"
        fi

        echo "Renaming from $SOURCE_FILE to $BUILD_DIR/$OUTPUT_FILE"
        mv "$SOURCE_FILE" "$BUILD_DIR/$OUTPUT_FILE"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: yuze-${{ runner.os }}-${{ runner.arch }}-${{ matrix.c_compiler }}
        path: ${{ steps.strings.outputs.build-output-dir }}/yuze-${{ runner.os }}-${{ runner.arch }}*
        if-no-files-found: error
        retention-days: 7

  # --- 任务 2: 专门编译 FreeBSD (在虚拟机中运行) ---
  build-freebsd:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build in FreeBSD VM
      uses: vmactions/freebsd-vm@v1
      with:
        usesh: true
        # 安装 FreeBSD 编译所需的依赖
        prepare: |
          pkg install -y cmake
        run: |
          # 1. 创建编译目录并配置
          cmake -B build -DCMAKE_BUILD_TYPE=Release -S .
          
          # 2. 执行编译
          cmake --build build --config Release
          
          # 3. 仿照原逻辑重命名文件名 (FreeBSD 架构通常是 amd64)
          ARCH=$(uname -m)
          mv build/yuze build/yuze-FreeBSD-$ARCH

    - name: Upload FreeBSD Artifact
      uses: actions/upload-artifact@v4
      with:
        name: yuze-FreeBSD-x64-clang
        path: build/yuze-FreeBSD-*
        if-no-files-found: error
        retention-days: 7
